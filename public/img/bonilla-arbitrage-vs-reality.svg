<svg xmlns="http://www.w3.org/2000/svg" width="100%" font-family="Georgia, serif" viewBox="0 0 700 440"><rect width="700" height="440" fill="#1a1a2e" rx="12"/><text x="350" y="32" fill="#fff" font-size="16" font-weight="bold" text-anchor="middle">The Arbitrage Logic vs. What Actually Happened</text><text x="40" y="72" fill="#5b9bd5" font-size="13" font-weight="bold">Expected Outcome (2000)</text><rect width="140" height="52" x="40" y="86" fill="#1e2a4a" stroke="#5b9bd5" stroke-width="1" rx="8"/><text x="110" y="107" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Keep $5.9M</text><text x="110" y="123" fill="#ccc" font-size="10" text-anchor="middle">Defer Bonilla&apos;s salary</text><line x1="180" x2="210" y1="112" y2="112" stroke="#5b9bd5" stroke-width="1.5" marker-end="url(#arrowBlue)"/><rect width="140" height="52" x="212" y="86" fill="#1e2a4a" stroke="#5b9bd5" stroke-width="1" rx="8"/><text x="282" y="107" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Invest with Madoff</text><text x="282" y="123" fill="#ccc" font-size="10" text-anchor="middle">10-12% annual return</text><line x1="352" x2="382" y1="112" y2="112" stroke="#5b9bd5" stroke-width="1.5" marker-end="url(#arrowBlue)"/><rect width="140" height="52" x="384" y="86" fill="#1e2a4a" stroke="#5b9bd5" stroke-width="1" rx="8"/><text x="454" y="107" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Pay Bonilla 8%</text><text x="454" y="123" fill="#ccc" font-size="10" text-anchor="middle">Pocket the 2-4% spread</text><line x1="524" x2="554" y1="112" y2="112" stroke="#5b9bd5" stroke-width="1.5" marker-end="url(#arrowBlue)"/><rect width="120" height="52" x="556" y="86" fill="#1a3a2a" stroke="#4caf7a" stroke-width="1" rx="8"/><text x="616" y="107" fill="#4caf7a" font-size="11" font-weight="bold" text-anchor="middle">Net profit</text><text x="616" y="123" fill="#ccc" font-size="10" text-anchor="middle">Free money on paper</text><rect width="636" height="56" x="40" y="160" fill="#1e2a4a" stroke="#5b9bd5" stroke-width=".5" rx="8"/><text x="358" y="180" fill="#5b9bd5" font-size="11" font-weight="bold" text-anchor="middle">Short-term wins were real</text><text x="358" y="198" fill="#ccc" font-size="10" text-anchor="middle">$5.9M freed up payroll &gt; signed Mike Hampton &gt; 2000 World Series &gt; drafted David Wright</text><line x1="40" x2="660" y1="236" y2="236" stroke="#446" stroke-dasharray="4 4" stroke-width=".5"/><text x="40" y="264" fill="#e07050" font-size="13" font-weight="bold">What Actually Happened (2008)</text><rect width="140" height="52" x="40" y="278" fill="#3a1e1e" stroke="#e07050" stroke-width="1" rx="8"/><text x="110" y="299" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Madoff arrested</text><text x="110" y="315" fill="#ccc" font-size="10" text-anchor="middle">Ponzi scheme exposed</text><line x1="180" x2="210" y1="304" y2="304" stroke="#e07050" stroke-width="1.5" marker-end="url(#arrowRed)"/><rect width="140" height="52" x="212" y="278" fill="#3a1e1e" stroke="#e07050" stroke-width="1" rx="8"/><text x="282" y="299" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Returns vanish</text><text x="282" y="315" fill="#ccc" font-size="10" text-anchor="middle">No funding source</text><line x1="352" x2="382" y1="304" y2="304" stroke="#e07050" stroke-width="1.5" marker-end="url(#arrowRed)"/><rect width="140" height="52" x="384" y="278" fill="#3a1e1e" stroke="#e07050" stroke-width="1" rx="8"/><text x="454" y="299" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">$29.8M liability</text><text x="454" y="315" fill="#ccc" font-size="10" text-anchor="middle">Still compounding at 8%</text><line x1="524" x2="554" y1="304" y2="304" stroke="#e07050" stroke-width="1.5" marker-end="url(#arrowRed)"/><rect width="120" height="52" x="556" y="278" fill="#3a1a1a" stroke="#c33" stroke-width="1" rx="8"/><text x="616" y="299" fill="#c33" font-size="11" font-weight="bold" text-anchor="middle">Decade of</text><text x="616" y="315" fill="#ccc" font-size="10" text-anchor="middle">financial austerity</text><rect width="636" height="56" x="40" y="352" fill="#2a1e2e" stroke="#96a" stroke-width=".5" rx="8"/><text x="358" y="374" fill="#ddd" font-size="11" font-weight="bold" text-anchor="middle">PM takeaway</text><text x="358" y="392" fill="#aaa" font-size="10" text-anchor="middle">Short-term wins are not evidence your strategy is sound. They are evidence it has not been tested yet.</text><text x="350" y="430" fill="#666680" font-size="10" font-style="italic" text-anchor="middle">The Mets looked brilliant for three years and spent the next fifteen paying for it.</text><defs><marker id="arrowBlue" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="8" refY="5" viewBox="0 0 10 10"><path fill="none" stroke="#5b9bd5" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2 1L8 5L2 9"/></marker><marker id="arrowRed" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="8" refY="5" viewBox="0 0 10 10"><path fill="none" stroke="#e07050" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2 1L8 5L2 9"/></marker></defs></svg>