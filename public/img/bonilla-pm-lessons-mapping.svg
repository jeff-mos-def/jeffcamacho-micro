<svg width="100%" viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect width="700" height="520" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">What the Mets Did vs. What PMs Should Do</text>

  <!-- Column headers -->
  <text x="160" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#e07050">What the Mets did</text>
  <text x="540" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b9bd5">PM principle</text>

  <!-- Row 1 -->
  <rect x="30" y="80" width="260" height="56" rx="8" fill="#3a1e1e" stroke="#e07050" stroke-width="0.8"/>
  <text x="160" y="102" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Single investment source</text>
  <text x="160" y="120" text-anchor="middle" font-size="10" fill="#cccccc">Entire strategy depended on Madoff</text>

  <line x1="290" y1="108" x2="408" y2="108" stroke="#666680" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="410" y="80" width="260" height="56" rx="8" fill="#1e2a4a" stroke="#5b9bd5" stroke-width="0.8"/>
  <text x="540" y="102" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Stress-test assumptions</text>
  <text x="540" y="120" text-anchor="middle" font-size="10" fill="#cccccc">Model downside scenarios in your risk register</text>

  <!-- Row 2 -->
  <rect x="30" y="156" width="260" height="56" rx="8" fill="#3a1e1e" stroke="#e07050" stroke-width="0.8"/>
  <text x="160" y="178" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Restructured sunk cost</text>
  <text x="160" y="196" text-anchor="middle" font-size="10" fill="#cccccc">Turned $5.9M into $29.8M to avoid pain</text>

  <line x1="290" y1="184" x2="408" y2="184" stroke="#666680" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="410" y="156" width="260" height="56" rx="8" fill="#1e2a4a" stroke="#5b9bd5" stroke-width="0.8"/>
  <text x="540" y="178" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Absorb sunk costs</text>
  <text x="540" y="196" text-anchor="middle" font-size="10" fill="#cccccc">Ask what it costs to stop, not what you spent</text>

  <!-- Row 3 -->
  <rect x="30" y="232" width="260" height="56" rx="8" fill="#3a1e1e" stroke="#e07050" stroke-width="0.8"/>
  <text x="160" y="254" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">No governance guardrails</text>
  <text x="160" y="272" text-anchor="middle" font-size="10" fill="#cccccc">No escrow, no NPV, no luxury tax in 2000</text>

  <line x1="290" y1="260" x2="408" y2="260" stroke="#666680" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="410" y="232" width="260" height="56" rx="8" fill="#1e2a4a" stroke="#5b9bd5" stroke-width="0.8"/>
  <text x="540" y="254" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Build structural controls</text>
  <text x="540" y="272" text-anchor="middle" font-size="10" fill="#cccccc">Phase gates, procurement reviews, finance sign-off</text>

  <!-- Row 4 -->
  <rect x="30" y="308" width="260" height="56" rx="8" fill="#3a1e1e" stroke="#e07050" stroke-width="0.8"/>
  <text x="160" y="330" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Celebrated short-term wins</text>
  <text x="160" y="348" text-anchor="middle" font-size="10" fill="#cccccc">World Series, David Wright, payroll flex</text>

  <line x1="290" y1="336" x2="408" y2="336" stroke="#666680" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="410" y="308" width="260" height="56" rx="8" fill="#1e2a4a" stroke="#5b9bd5" stroke-width="0.8"/>
  <text x="540" y="330" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Measure structural health</text>
  <text x="540" y="348" text-anchor="middle" font-size="10" fill="#cccccc">Milestones hit means nothing if reserves are gone</text>

  <!-- Row 5 -->
  <rect x="30" y="384" width="260" height="56" rx="8" fill="#3a1e1e" stroke="#e07050" stroke-width="0.8"/>
  <text x="160" y="406" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Learned nothing (initially)</text>
  <text x="160" y="424" text-anchor="middle" font-size="10" fill="#cccccc">No rule changes until years later</text>

  <line x1="290" y1="412" x2="408" y2="412" stroke="#666680" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="410" y="384" width="260" height="56" rx="8" fill="#1e2a4a" stroke="#5b9bd5" stroke-width="0.8"/>
  <text x="540" y="406" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Lessons become policy</text>
  <text x="540" y="424" text-anchor="middle" font-size="10" fill="#cccccc">Updated templates, workflows, and governance</text>

  <!-- Footer -->
  <text x="350" y="470" text-anchor="middle" font-size="11" fill="#dddddd" font-weight="bold">MLB eventually codified every one of these fixes into the CBA.</text>
  <text x="350" y="490" text-anchor="middle" font-size="10" fill="#aaaaaa">Article XVI (escrow) + Article XXIII (NPV tax accounting) + IRC 409A (payment schedule enforcement)</text>
  <text x="350" y="510" text-anchor="middle" font-size="10" fill="#666680" font-style="italic">The question is whether your organization does the same.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666680" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
