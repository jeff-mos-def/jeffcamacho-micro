<svg xmlns="http://www.w3.org/2000/svg" width="100%" font-family="Georgia, serif" viewBox="0 0 700 520"><rect width="700" height="520" fill="#1a1a2e" rx="12"/><text x="350" y="32" fill="#fff" font-size="16" font-weight="bold" text-anchor="middle">What the Mets Did vs. What PMs Should Do</text><text x="160" y="62" fill="#e07050" font-size="12" font-weight="bold" text-anchor="middle">What the Mets did</text><text x="540" y="62" fill="#5b9bd5" font-size="12" font-weight="bold" text-anchor="middle">PM principle</text><rect width="260" height="56" x="30" y="80" fill="#3a1e1e" stroke="#e07050" stroke-width=".8" rx="8"/><text x="160" y="102" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Single investment source</text><text x="160" y="120" fill="#ccc" font-size="10" text-anchor="middle">Entire strategy depended on Madoff</text><line x1="290" x2="408" y1="108" y2="108" stroke="#666680" stroke-width="1" marker-end="url(#arrowGray)"/><rect width="260" height="56" x="410" y="80" fill="#1e2a4a" stroke="#5b9bd5" stroke-width=".8" rx="8"/><text x="540" y="102" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Stress-test assumptions</text><text x="540" y="120" fill="#ccc" font-size="10" text-anchor="middle">Model downside scenarios in your risk register</text><rect width="260" height="56" x="30" y="156" fill="#3a1e1e" stroke="#e07050" stroke-width=".8" rx="8"/><text x="160" y="178" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Restructured sunk cost</text><text x="160" y="196" fill="#ccc" font-size="10" text-anchor="middle">Turned $5.9M into $29.8M to avoid pain</text><line x1="290" x2="408" y1="184" y2="184" stroke="#666680" stroke-width="1" marker-end="url(#arrowGray)"/><rect width="260" height="56" x="410" y="156" fill="#1e2a4a" stroke="#5b9bd5" stroke-width=".8" rx="8"/><text x="540" y="178" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Absorb sunk costs</text><text x="540" y="196" fill="#ccc" font-size="10" text-anchor="middle">Ask what it costs to stop, not what you spent</text><rect width="260" height="56" x="30" y="232" fill="#3a1e1e" stroke="#e07050" stroke-width=".8" rx="8"/><text x="160" y="254" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">No governance guardrails</text><text x="160" y="272" fill="#ccc" font-size="10" text-anchor="middle">No escrow, no NPV, no luxury tax in 2000</text><line x1="290" x2="408" y1="260" y2="260" stroke="#666680" stroke-width="1" marker-end="url(#arrowGray)"/><rect width="260" height="56" x="410" y="232" fill="#1e2a4a" stroke="#5b9bd5" stroke-width=".8" rx="8"/><text x="540" y="254" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Build structural controls</text><text x="540" y="272" fill="#ccc" font-size="10" text-anchor="middle">Phase gates, procurement reviews, finance sign-off</text><rect width="260" height="56" x="30" y="308" fill="#3a1e1e" stroke="#e07050" stroke-width=".8" rx="8"/><text x="160" y="330" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Celebrated short-term wins</text><text x="160" y="348" fill="#ccc" font-size="10" text-anchor="middle">World Series, David Wright, payroll flex</text><line x1="290" x2="408" y1="336" y2="336" stroke="#666680" stroke-width="1" marker-end="url(#arrowGray)"/><rect width="260" height="56" x="410" y="308" fill="#1e2a4a" stroke="#5b9bd5" stroke-width=".8" rx="8"/><text x="540" y="330" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Measure structural health</text><text x="540" y="348" fill="#ccc" font-size="10" text-anchor="middle">Milestones hit means nothing if reserves are gone</text><rect width="260" height="56" x="30" y="384" fill="#3a1e1e" stroke="#e07050" stroke-width=".8" rx="8"/><text x="160" y="406" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Learned nothing (initially)</text><text x="160" y="424" fill="#ccc" font-size="10" text-anchor="middle">No rule changes until years later</text><line x1="290" x2="408" y1="412" y2="412" stroke="#666680" stroke-width="1" marker-end="url(#arrowGray)"/><rect width="260" height="56" x="410" y="384" fill="#1e2a4a" stroke="#5b9bd5" stroke-width=".8" rx="8"/><text x="540" y="406" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Lessons become policy</text><text x="540" y="424" fill="#ccc" font-size="10" text-anchor="middle">Updated templates, workflows, and governance</text><text x="350" y="470" fill="#ddd" font-size="11" font-weight="bold" text-anchor="middle">MLB eventually codified every one of these fixes into the CBA.</text><text x="350" y="490" fill="#aaa" font-size="10" text-anchor="middle">Article XVI (escrow) + Article XXIII (NPV tax accounting) + IRC 409A (payment schedule enforcement)</text><text x="350" y="510" fill="#666680" font-size="10" font-style="italic" text-anchor="middle">The question is whether your organization does the same.</text><defs><marker id="arrowGray" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="8" refY="5" viewBox="0 0 10 10"><path fill="none" stroke="#666680" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2 1L8 5L2 9"/></marker></defs></svg>