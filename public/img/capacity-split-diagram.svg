<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 720 280"><text x="360" y="24" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">Capacity Split: Hybrid Delivery for Mixed Teams</text><line x1="40" x2="680" y1="38" y2="38" stroke="#555" stroke-width=".5"/><text x="40" y="70" fill="#ccc" font-size="12" font-weight="bold">Recommended starting point</text><rect width="384" height="44" x="40" y="80" fill="#1e3a5f" stroke="#3B82F6" stroke-width="1" rx="8"/><text x="232" y="100" fill="#7BB8F5" font-size="13" font-weight="bold" text-anchor="middle">Planned Sprint Work (Scrum)</text><text x="232" y="116" fill="#ccc" font-size="11" text-anchor="middle">60%</text><rect width="256" height="44" x="424" y="80" fill="#3d2508" stroke="#D97706" stroke-width="1" rx="8"/><text x="552" y="100" fill="#FBBF24" font-size="13" font-weight="bold" text-anchor="middle">Operational Interrupts (Kanban)</text><text x="552" y="116" fill="#ccc" font-size="11" text-anchor="middle">40%</text><text x="40" y="154" fill="#aaa" font-size="12">Product-heavy teams</text><rect width="448" height="32" x="40" y="164" fill="#152d4a" stroke="#3B82F6" stroke-width=".5" rx="6"/><text x="264" y="184" fill="#7BB8F5" font-size="12" text-anchor="middle">70% Planned</text><rect width="192" height="32" x="488" y="164" fill="#2d1c06" stroke="#D97706" stroke-width=".5" rx="6"/><text x="584" y="184" fill="#FBBF24" font-size="12" text-anchor="middle">30% Reactive</text><text x="40" y="220" fill="#aaa" font-size="12">Ops-heavy teams</text><rect width="320" height="32" x="40" y="230" fill="#152d4a" stroke="#3B82F6" stroke-width=".5" rx="6"/><text x="200" y="250" fill="#7BB8F5" font-size="12" text-anchor="middle">50% Planned</text><rect width="320" height="32" x="360" y="230" fill="#2d1c06" stroke="#D97706" stroke-width=".5" rx="6"/><text x="520" y="250" fill="#FBBF24" font-size="12" text-anchor="middle">50% Reactive</text></svg>