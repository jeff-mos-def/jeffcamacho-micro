<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Capacity Split: Hybrid Delivery for Mixed Teams</text>

  <!-- Divider -->
  <line x1="40" y1="38" x2="680" y2="38" stroke="#555" stroke-width="0.5"/>

  <!-- Bar 1: 60/40 (Recommended) -->
  <text x="40" y="70" font-size="12" font-weight="bold" fill="#cccccc">Recommended starting point</text>

  <!-- Scrum portion -->
  <rect x="40" y="80" width="384" height="44" rx="8" fill="#1e3a5f" stroke="#3B82F6" stroke-width="1"/>
  <text x="232" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#7BB8F5">Planned Sprint Work (Scrum)</text>
  <text x="232" y="116" text-anchor="middle" font-size="11" fill="#cccccc">60%</text>

  <!-- Kanban portion -->
  <rect x="424" y="80" width="256" height="44" rx="8" fill="#3d2508" stroke="#D97706" stroke-width="1"/>
  <text x="552" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#FBBF24">Operational Interrupts (Kanban)</text>
  <text x="552" y="116" text-anchor="middle" font-size="11" fill="#cccccc">40%</text>

  <!-- Bar 2: 70/30 -->
  <text x="40" y="154" font-size="12" fill="#aaaaaa">Product-heavy teams</text>

  <rect x="40" y="164" width="448" height="32" rx="6" fill="#152d4a" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="264" y="184" text-anchor="middle" font-size="12" fill="#7BB8F5">70% Planned</text>

  <rect x="488" y="164" width="192" height="32" rx="6" fill="#2d1c06" stroke="#D97706" stroke-width="0.5"/>
  <text x="584" y="184" text-anchor="middle" font-size="12" fill="#FBBF24">30% Reactive</text>

  <!-- Bar 3: 50/50 -->
  <text x="40" y="220" font-size="12" fill="#aaaaaa">Ops-heavy teams</text>

  <rect x="40" y="230" width="320" height="32" rx="6" fill="#152d4a" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="200" y="250" text-anchor="middle" font-size="12" fill="#7BB8F5">50% Planned</text>

  <rect x="360" y="230" width="320" height="32" rx="6" fill="#2d1c06" stroke="#D97706" stroke-width="0.5"/>
  <text x="520" y="250" text-anchor="middle" font-size="12" fill="#FBBF24">50% Reactive</text>

</svg>
