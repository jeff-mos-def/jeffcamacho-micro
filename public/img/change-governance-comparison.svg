<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-label="Change governance comparison: traditional vs committee-based approach">
  <rect width="720" height="380" fill="#f8f9fa" rx="8"/>
  <text x="360" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1a1a2e">Change Governance: Old Model vs. New Model</text>

  <text x="180" y="64" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#d62828">Traditional (Pre-2022 / Enterprise Default)</text>

  <rect x="80" y="80" width="200" height="36" rx="6" fill="#fee2e2"/>
  <text x="180" y="103" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#991b1b">1. Propose change</text>

  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d62828"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d6a4f"/>
    </marker>
  </defs>

  <line x1="180" y1="116" x2="180" y2="130" stroke="#d62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="80" y="130" width="200" height="36" rx="6" fill="#fee2e2"/>
  <text x="180" y="153" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#991b1b">2. Wait (mandatory cool-off)</text>

  <line x1="180" y1="166" x2="180" y2="180" stroke="#d62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="80" y="180" width="200" height="36" rx="6" fill="#fee2e2"/>
  <text x="180" y="203" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#991b1b">3. Escalate to governance board</text>

  <line x1="180" y1="216" x2="180" y2="230" stroke="#d62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="80" y="230" width="200" height="36" rx="6" fill="#fee2e2"/>
  <text x="180" y="253" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#991b1b">4. Debate across stakeholders</text>

  <line x1="180" y1="266" x2="180" y2="280" stroke="#d62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="80" y="280" width="200" height="36" rx="6" fill="#fee2e2"/>
  <text x="180" y="303" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#991b1b">5. Maybe implement next FY</text>

  <text x="180" y="340" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#d62828">Timeline: 6-12+ months</text>

  <line x1="360" y1="55" x2="360" y2="365" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="540" y="64" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#2d6a4f">Committee-Based (CBA 2022 / Agile Governance)</text>

  <rect x="440" y="80" width="200" height="36" rx="6" fill="#d1fae5"/>
  <text x="540" y="103" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#065f46">1. Standing committee convenes</text>

  <line x1="540" y1="116" x2="540" y2="140" stroke="#2d6a4f" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="440" y="140" width="200" height="36" rx="6" fill="#d1fae5"/>
  <text x="540" y="163" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#065f46">2. Cross-functional review</text>

  <line x1="540" y1="176" x2="540" y2="200" stroke="#2d6a4f" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="440" y="200" width="200" height="36" rx="6" fill="#d1fae5"/>
  <text x="540" y="223" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#065f46">3. Decide and implement</text>

  <text x="540" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#2d6a4f">Timeline: 45 days or less</text>

  <rect x="430" y="290" width="220" height="66" rx="6" fill="#ffffff" stroke="#2d6a4f" stroke-width="1"/>
  <text x="540" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2d6a4f">Committee Composition</text>
  <text x="540" y="326" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#374151">4 Players + 6 MLB Reps + 1 Umpire</text>
  <text x="540" y="346" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280" font-style="italic">= Delivery Team + Stakeholders + End Users</text>
</svg>
