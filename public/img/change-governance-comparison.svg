<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <text x="500" y="30" font-family="sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">Change Governance: Old Model vs. New Model</text>
  
  <line x1="500" y1="60" x2="500" y2="580" stroke="#cccccc" stroke-dasharray="5,5" stroke-width="2"/>

  <text x="250" y="80" font-family="sans-serif" font-size="16" fill="#ff6b6b" text-anchor="middle">Traditional (Pre-2022 / Enterprise Default)</text>
  
  <g transform="translate(100, 110)">
    <rect width="300" height="40" rx="4" fill="#a63a3a" stroke="#ffffff" stroke-width="1"/>
    <text x="150" y="25" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">1. Propose change</text>
  </g>
  
  <path d="M 250 150 L 250 170" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <g transform="translate(100, 170)">
    <rect width="300" height="40" rx="4" fill="#a63a3a" stroke="#ffffff" stroke-width="1"/>
    <text x="150" y="25" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">2. Wait (mandatory cool-off)</text>
  </g>
  
  <path d="M 250 210 L 250 230" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <g transform="translate(100, 230)">
    <rect width="300" height="40" rx="4" fill="#a63a3a" stroke="#ffffff" stroke-width="1"/>
    <text x="150" y="25" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">3. Escalate to governance board</text>
  </g>
  
  <path d="M 250 270 L 250 290" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <g transform="translate(100, 290)">
    <rect width="300" height="40" rx="4" fill="#a63a3a" stroke="#ffffff" stroke-width="1"/>
    <text x="150" y="25" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">4. Debate across stakeholders</text>
  </g>
  
  <path d="M 250 330 L 250 350" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <g transform="translate(100, 350)">
    <rect width="300" height="40" rx="4" fill="#a63a3a" stroke="#ffffff" stroke-width="1"/>
    <text x="150" y="25" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">5. Maybe implement next FY</text>
  </g>
  
  <text x="250" y="420" font-family="sans-serif" font-size="14" fill="#ff6b6b" text-anchor="middle">Timeline: 6-12+ months</text>

  <text x="750" y="80" font-family="sans-serif" font-size="16" fill="#4ade80" text-anchor="middle">Competition Committee (CBA 2022)</text>
  
  <g transform="translate(600, 110)">
    <rect width="300" height="40" rx="4" fill="#114b3d" stroke="#ffffff" stroke-width="1"/>
    <text x="150" y="25" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">1. Committee recommends change</text>
  </g>
  
  <path d="M 750 150 L 750 180" stroke="#4ade80" stroke-width="2" marker-end="url(#arrow-green)"/>
  
  <g transform="translate(600, 180)">
    <rect width="300" height="40" rx="4" fill="#114b3d" stroke="#ffffff" stroke-width="1"/>
    <text x="150" y="25" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">2. 45-day consultation period</text>
  </g>
  
  <path d="M 750 220 L 750 250" stroke="#4ade80" stroke-width="2" marker-end="url(#arrow-green)"/>
  
  <g transform="translate(600, 250)">
    <rect width="300" height="40" rx="4" fill="#114b3d" stroke="#ffffff" stroke-width="1"/>
    <text x="150" y="25" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">3. Final vote (majority rules)</text>
  </g>
  
  <text x="750" y="325" font-family="sans-serif" font-size="12" fill="#4ade80" text-anchor="middle">Finalized before Spring Training</text>
  <text x="750" y="340" font-family="sans-serif" font-size="12" fill="#4ade80" text-anchor="middle">reporting date</text>

  <g transform="translate(580, 360)">
    <rect width="340" height="100" rx="4" fill="none" stroke="#4ade80" stroke-width="1"/>
    <text x="170" y="25" font-family="sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Committee Composition</text>
    <text x="170" y="45" font-family="sans-serif" font-size="12" fill="#cccccc" text-anchor="middle">4 Players + 6 Commissioner Reps</text>
    <text x="170" y="60" font-family="sans-serif" font-size="12" fill="#cccccc" text-anchor="middle">+ 1 Umpire (majority vote)</text>
    <text x="170" y="85" font-family="sans-serif" font-size="11" fill="#aaaaaa" text-anchor="middle">= Delivery Team + Stakeholders + End Users</text>
  </g>

  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b6b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
    </marker>
  </defs>
</svg>
