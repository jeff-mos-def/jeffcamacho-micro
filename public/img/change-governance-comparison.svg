<svg xmlns="http://www.w3.org/2000/svg" aria-label="Change governance comparison: traditional vs committee-based approach" role="img" viewBox="0 0 720 380"><rect width="720" height="380" fill="#f8f9fa" rx="8"/><text x="360" y="32" fill="#1a1a2e" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Change Governance: Old Model vs. New Model</text><text x="180" y="64" fill="#d62828" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Traditional (Pre-2022 / Enterprise Default)</text><rect width="200" height="36" x="80" y="80" fill="#fee2e2" rx="6"/><text x="180" y="103" fill="#991b1b" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">1. Propose change</text><defs><marker id="arrowRed" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#d62828" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arrowGreen" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#2d6a4f" d="M 0 0 L 10 5 L 0 10 z"/></marker></defs><line x1="180" x2="180" y1="116" y2="130" stroke="#d62828" stroke-width="1.5" marker-end="url(#arrowRed)"/><rect width="200" height="36" x="80" y="130" fill="#fee2e2" rx="6"/><text x="180" y="153" fill="#991b1b" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">2. Wait (mandatory cool-off)</text><line x1="180" x2="180" y1="166" y2="180" stroke="#d62828" stroke-width="1.5" marker-end="url(#arrowRed)"/><rect width="200" height="36" x="80" y="180" fill="#fee2e2" rx="6"/><text x="180" y="203" fill="#991b1b" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">3. Escalate to governance board</text><line x1="180" x2="180" y1="216" y2="230" stroke="#d62828" stroke-width="1.5" marker-end="url(#arrowRed)"/><rect width="200" height="36" x="80" y="230" fill="#fee2e2" rx="6"/><text x="180" y="253" fill="#991b1b" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">4. Debate across stakeholders</text><line x1="180" x2="180" y1="266" y2="280" stroke="#d62828" stroke-width="1.5" marker-end="url(#arrowRed)"/><rect width="200" height="36" x="80" y="280" fill="#fee2e2" rx="6"/><text x="180" y="303" fill="#991b1b" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">5. Maybe implement next FY</text><text x="180" y="340" fill="#d62828" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Timeline: 6-12+ months</text><line x1="360" x2="360" y1="55" y2="365" stroke="#d1d5db" stroke-dasharray="4 4" stroke-width="1"/><text x="540" y="64" fill="#2d6a4f" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Committee-Based (CBA 2022 / Agile Governance)</text><rect width="200" height="36" x="440" y="80" fill="#d1fae5" rx="6"/><text x="540" y="103" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">1. Standing committee convenes</text><line x1="540" x2="540" y1="116" y2="140" stroke="#2d6a4f" stroke-width="1.5" marker-end="url(#arrowGreen)"/><rect width="200" height="36" x="440" y="140" fill="#d1fae5" rx="6"/><text x="540" y="163" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">2. Cross-functional review</text><line x1="540" x2="540" y1="176" y2="200" stroke="#2d6a4f" stroke-width="1.5" marker-end="url(#arrowGreen)"/><rect width="200" height="36" x="440" y="200" fill="#d1fae5" rx="6"/><text x="540" y="223" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">3. Decide and implement</text><text x="540" y="270" fill="#2d6a4f" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Timeline: 45 days or less</text><rect width="220" height="66" x="430" y="290" fill="#fff" stroke="#2d6a4f" stroke-width="1" rx="6"/><text x="540" y="310" fill="#2d6a4f" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Committee Composition</text><text x="540" y="326" fill="#374151" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">4 Players + 6 MLB Reps + 1 Umpire</text><text x="540" y="346" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic" text-anchor="middle">= Delivery Team + Stakeholders + End Users</text></svg>