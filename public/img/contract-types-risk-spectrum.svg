<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <rect width="900" height="340" fill="#0f1923"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff" letter-spacing="1">CONTRACT TYPE RISK SPECTRUM</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" fill="#aaaaaa">Where does cost risk live: contractor or government?</text>

  <!-- Spectrum bar -->
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a6b3c"/>
      <stop offset="50%" style="stop-color:#b8860b"/>
      <stop offset="100%" style="stop-color:#8b1a1a"/>
    </linearGradient>
  </defs>
  <rect x="60" y="60" width="780" height="14" rx="7" fill="url(#sg)" opacity="0.9"/>
  <text x="60" y="88" font-size="10" fill="#4caf7d" font-style="italic">Contractor bears risk</text>
  <text x="840" y="88" text-anchor="end" font-size="10" fill="#e05c5c" font-style="italic">Government bears risk</text>

  <!-- Marker dots -->
  <circle cx="168" cy="67" r="5" fill="#2ecc71"/>
  <circle cx="378" cy="67" r="5" fill="#f0c040"/>
  <circle cx="558" cy="67" r="5" fill="#e8943a"/>
  <circle cx="738" cy="67" r="5" fill="#e05c5c"/>

  <!-- Column headers -->
  <rect x="22" y="100" width="200" height="28" rx="4" fill="#1a6b3c"/>
  <rect x="228" y="100" width="200" height="28" rx="4" fill="#7a6200"/>
  <rect x="434" y="100" width="200" height="28" rx="4" fill="#7a3e00"/>
  <rect x="640" y="100" width="238" height="28" rx="4" fill="#7a1a1a"/>

  <text x="122" y="119" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">FIRM FIXED PRICE</text>
  <text x="328" y="119" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">IDIQ</text>
  <text x="534" y="119" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">TIME &amp; MATERIALS</text>
  <text x="759" y="119" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">COST-REIMBURSEMENT</text>

  <!-- Row: Abbrev -->
  <text x="122" y="148" text-anchor="middle" font-size="10" fill="#aaffcc">(FFP)</text>
  <text x="328" y="148" text-anchor="middle" font-size="10" fill="#ffe87a">Indef. Delivery / Indef. Qty</text>
  <text x="534" y="148" text-anchor="middle" font-size="10" fill="#ffbb77">(T&amp;M)</text>
  <text x="759" y="148" text-anchor="middle" font-size="10" fill="#ffaaaa">(CPFF, CPIF, CPAF)</text>

  <!-- Divider -->
  <line x1="22" y1="156" x2="878" y2="156" stroke="#1e3a52" stroke-width="1"/>

  <!-- Row: Risk owner label -->
  <text x="22" y="172" font-size="9" fill="#888888">RISK OWNER</text>
  <text x="228" y="172" font-size="9" fill="#888888">RISK OWNER</text>
  <text x="434" y="172" font-size="9" fill="#888888">RISK OWNER</text>
  <text x="640" y="172" font-size="9" fill="#888888">RISK OWNER</text>

  <text x="122" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#2ecc71">Contractor</text>
  <text x="328" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#f0c040">Shared</text>
  <text x="534" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#e8943a">Mostly Government</text>
  <text x="759" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#e05c5c">Government</text>

  <!-- Divider -->
  <line x1="22" y1="198" x2="878" y2="198" stroke="#1e3a52" stroke-width="1"/>

  <!-- Row: Best when -->
  <text x="22" y="213" font-size="9" fill="#888888">BEST WHEN</text>
  <text x="228" y="213" font-size="9" fill="#888888">BEST WHEN</text>
  <text x="434" y="213" font-size="9" fill="#888888">BEST WHEN</text>
  <text x="640" y="213" font-size="9" fill="#888888">BEST WHEN</text>

  <text x="122" y="228" text-anchor="middle" font-size="10" fill="#dddddd">Requirements clear</text>
  <text x="122" y="242" text-anchor="middle" font-size="10" fill="#dddddd">and stable</text>
  <text x="328" y="228" text-anchor="middle" font-size="10" fill="#dddddd">Volume uncertain;</text>
  <text x="328" y="242" text-anchor="middle" font-size="10" fill="#dddddd">GSA Schedules, GWACs</text>
  <text x="534" y="228" text-anchor="middle" font-size="10" fill="#dddddd">Effort uncertain;</text>
  <text x="534" y="242" text-anchor="middle" font-size="10" fill="#dddddd">common in IT services</text>
  <text x="759" y="228" text-anchor="middle" font-size="10" fill="#dddddd">Requirements unknown;</text>
  <text x="759" y="242" text-anchor="middle" font-size="10" fill="#dddddd">R&amp;D, complex systems</text>

  <!-- Divider -->
  <line x1="22" y1="252" x2="878" y2="252" stroke="#1e3a52" stroke-width="1"/>

  <!-- Row: PM watch-out -->
  <text x="22" y="267" font-size="9" fill="#888888">PM WATCH-OUT</text>
  <text x="228" y="267" font-size="9" fill="#888888">PM WATCH-OUT</text>
  <text x="434" y="267" font-size="9" fill="#888888">PM WATCH-OUT</text>
  <text x="640" y="267" font-size="9" fill="#888888">PM WATCH-OUT</text>

  <text x="122" y="282" text-anchor="middle" font-size="10" fill="#ffcc44">Overruns eat</text>
  <text x="122" y="296" text-anchor="middle" font-size="10" fill="#ffcc44">contractor margin</text>
  <text x="328" y="282" text-anchor="middle" font-size="10" fill="#ffcc44">Scope creep hides in</text>
  <text x="328" y="296" text-anchor="middle" font-size="10" fill="#ffcc44">task order mods</text>
  <text x="534" y="282" text-anchor="middle" font-size="10" fill="#ffcc44">No hour ceiling;</text>
  <text x="534" y="296" text-anchor="middle" font-size="10" fill="#ffcc44">track weekly not monthly</text>
  <text x="759" y="282" text-anchor="middle" font-size="10" fill="#ffcc44">DCAA audits are real;</text>
  <text x="759" y="296" text-anchor="middle" font-size="10" fill="#ffcc44">document everything</text>

  <!-- Footer -->
  <text x="450" y="322" text-anchor="middle" font-size="9" fill="#444444">jeffcamacho.com | FAR Crash Course for Project Managers</text>

</svg>
