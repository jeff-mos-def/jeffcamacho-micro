<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Four Work Types, Four Delivery Models</text>

  <!-- Divider -->
  <line x1="40" y1="38" x2="680" y2="38" stroke="#555" stroke-width="0.5"/>

  <!-- Box 1: Planned Product Work -->
  <rect x="40" y="56" width="148" height="220" rx="10" fill="#1a2744" stroke="#3B82F6" stroke-width="1"/>
  <text x="114" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#7BB8F5">Planned</text>
  <text x="114" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#7BB8F5">Product Work</text>
  <line x1="60" y1="110" x2="168" y2="110" stroke="#3B82F6" stroke-width="0.5" opacity="0.4"/>
  <text x="114" y="130" text-anchor="middle" font-size="11" fill="#cccccc">Known backlog.</text>
  <text x="114" y="146" text-anchor="middle" font-size="11" fill="#cccccc">Predictable at the</text>
  <text x="114" y="162" text-anchor="middle" font-size="11" fill="#cccccc">two-week horizon.</text>
  <text x="114" y="178" text-anchor="middle" font-size="11" fill="#cccccc">Features, enhancements,</text>
  <text x="114" y="194" text-anchor="middle" font-size="11" fill="#cccccc">capabilities.</text>
  <line x1="60" y1="210" x2="168" y2="210" stroke="#3B82F6" stroke-width="0.5" opacity="0.4"/>
  <rect x="60" y="222" width="108" height="32" rx="6" fill="#1e3a5f" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="114" y="243" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Scrum</text>

  <!-- Box 2: Interrupt-Driven Service -->
  <rect x="210" y="56" width="148" height="220" rx="10" fill="#2a1a0a" stroke="#D97706" stroke-width="1"/>
  <text x="284" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#FBBF24">Interrupt-Driven</text>
  <text x="284" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#FBBF24">Service Work</text>
  <line x1="230" y1="110" x2="338" y2="110" stroke="#D97706" stroke-width="0.5" opacity="0.4"/>
  <text x="284" y="130" text-anchor="middle" font-size="11" fill="#cccccc">Tickets arrive</text>
  <text x="284" y="146" text-anchor="middle" font-size="11" fill="#cccccc">continuously. Volume</text>
  <text x="284" y="162" text-anchor="middle" font-size="11" fill="#cccccc">is unpredictable.</text>
  <text x="284" y="178" text-anchor="middle" font-size="11" fill="#cccccc">Service desks, IT</text>
  <text x="284" y="194" text-anchor="middle" font-size="11" fill="#cccccc">support, operations.</text>
  <line x1="230" y1="210" x2="338" y2="210" stroke="#D97706" stroke-width="0.5" opacity="0.4"/>
  <rect x="230" y="222" width="108" height="32" rx="6" fill="#3d2508" stroke="#D97706" stroke-width="0.5"/>
  <text x="284" y="243" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Kanban</text>

  <!-- Box 3: Continuous Data / Infra -->
  <rect x="380" y="56" width="148" height="220" rx="10" fill="#0a2a1a" stroke="#10B981" stroke-width="1"/>
  <text x="454" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#6EE7B7">Continuous</text>
  <text x="454" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#6EE7B7">Data / Infra</text>
  <line x1="400" y1="110" x2="508" y2="110" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
  <text x="454" y="130" text-anchor="middle" font-size="11" fill="#cccccc">Monitoring feeds,</text>
  <text x="454" y="146" text-anchor="middle" font-size="11" fill="#cccccc">ETL pipelines, data</text>
  <text x="454" y="162" text-anchor="middle" font-size="11" fill="#cccccc">quality checks. Goal</text>
  <text x="454" y="178" text-anchor="middle" font-size="11" fill="#cccccc">never changes: keep</text>
  <text x="454" y="194" text-anchor="middle" font-size="11" fill="#cccccc">the data flowing.</text>
  <line x1="400" y1="210" x2="508" y2="210" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
  <rect x="400" y="222" width="108" height="32" rx="6" fill="#0d3d24" stroke="#10B981" stroke-width="0.5"/>
  <text x="454" y="243" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">SLA-Driven Flow</text>

  <!-- Box 4: Mixed Project + Ops -->
  <rect x="550" y="56" width="148" height="220" rx="10" fill="#2a1a2e" stroke="#A855F7" stroke-width="1"/>
  <text x="624" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#C4B5FD">Mixed Project</text>
  <text x="624" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#C4B5FD">+ Operations</text>
  <line x1="570" y1="110" x2="678" y2="110" stroke="#A855F7" stroke-width="0.5" opacity="0.4"/>
  <text x="624" y="130" text-anchor="middle" font-size="11" fill="#cccccc">Half planned roadmap,</text>
  <text x="624" y="146" text-anchor="middle" font-size="11" fill="#cccccc">half production support.</text>
  <text x="624" y="162" text-anchor="middle" font-size="11" fill="#cccccc">Most common scenario.</text>
  <text x="624" y="178" text-anchor="middle" font-size="11" fill="#cccccc">Breaks Scrum fastest</text>
  <text x="624" y="194" text-anchor="middle" font-size="11" fill="#cccccc">when unacknowledged.</text>
  <line x1="570" y1="210" x2="678" y2="210" stroke="#A855F7" stroke-width="0.5" opacity="0.4"/>
  <rect x="570" y="222" width="108" height="32" rx="6" fill="#3d1a4a" stroke="#A855F7" stroke-width="0.5"/>
  <text x="624" y="243" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Hybrid Split</text>

  <!-- Footer -->
  <line x1="40" y1="296" x2="680" y2="296" stroke="#555" stroke-width="0.5"/>
  <text x="360" y="318" text-anchor="middle" font-size="12" fill="#aaaaaa" font-style="italic">Most organizations have all four. Many teams deal with more than one at the same time.</text>

</svg>
