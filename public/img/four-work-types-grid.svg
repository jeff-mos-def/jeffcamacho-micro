<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 720 340"><text x="360" y="24" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">Four Work Types, Four Delivery Models</text><line x1="40" x2="680" y1="38" y2="38" stroke="#555" stroke-width=".5"/><rect width="148" height="220" x="40" y="56" fill="#1a2744" stroke="#3B82F6" stroke-width="1" rx="10"/><text x="114" y="82" fill="#7BB8F5" font-size="13" font-weight="bold" text-anchor="middle">Planned</text><text x="114" y="98" fill="#7BB8F5" font-size="13" font-weight="bold" text-anchor="middle">Product Work</text><line x1="60" x2="168" y1="110" y2="110" stroke="#3B82F6" stroke-width=".5" opacity=".4"/><text x="114" y="130" fill="#ccc" font-size="11" text-anchor="middle">Known backlog.</text><text x="114" y="146" fill="#ccc" font-size="11" text-anchor="middle">Predictable at the</text><text x="114" y="162" fill="#ccc" font-size="11" text-anchor="middle">two-week horizon.</text><text x="114" y="178" fill="#ccc" font-size="11" text-anchor="middle">Features, enhancements,</text><text x="114" y="194" fill="#ccc" font-size="11" text-anchor="middle">capabilities.</text><line x1="60" x2="168" y1="210" y2="210" stroke="#3B82F6" stroke-width=".5" opacity=".4"/><rect width="108" height="32" x="60" y="222" fill="#1e3a5f" stroke="#3B82F6" stroke-width=".5" rx="6"/><text x="114" y="243" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">Scrum</text><rect width="148" height="220" x="210" y="56" fill="#2a1a0a" stroke="#D97706" stroke-width="1" rx="10"/><text x="284" y="82" fill="#FBBF24" font-size="13" font-weight="bold" text-anchor="middle">Interrupt-Driven</text><text x="284" y="98" fill="#FBBF24" font-size="13" font-weight="bold" text-anchor="middle">Service Work</text><line x1="230" x2="338" y1="110" y2="110" stroke="#D97706" stroke-width=".5" opacity=".4"/><text x="284" y="130" fill="#ccc" font-size="11" text-anchor="middle">Tickets arrive</text><text x="284" y="146" fill="#ccc" font-size="11" text-anchor="middle">continuously. Volume</text><text x="284" y="162" fill="#ccc" font-size="11" text-anchor="middle">is unpredictable.</text><text x="284" y="178" fill="#ccc" font-size="11" text-anchor="middle">Service desks, IT</text><text x="284" y="194" fill="#ccc" font-size="11" text-anchor="middle">support, operations.</text><line x1="230" x2="338" y1="210" y2="210" stroke="#D97706" stroke-width=".5" opacity=".4"/><rect width="108" height="32" x="230" y="222" fill="#3d2508" stroke="#D97706" stroke-width=".5" rx="6"/><text x="284" y="243" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">Kanban</text><rect width="148" height="220" x="380" y="56" fill="#0a2a1a" stroke="#10B981" stroke-width="1" rx="10"/><text x="454" y="82" fill="#6EE7B7" font-size="13" font-weight="bold" text-anchor="middle">Continuous</text><text x="454" y="98" fill="#6EE7B7" font-size="13" font-weight="bold" text-anchor="middle">Data / Infra</text><line x1="400" x2="508" y1="110" y2="110" stroke="#10B981" stroke-width=".5" opacity=".4"/><text x="454" y="130" fill="#ccc" font-size="11" text-anchor="middle">Monitoring feeds,</text><text x="454" y="146" fill="#ccc" font-size="11" text-anchor="middle">ETL pipelines, data</text><text x="454" y="162" fill="#ccc" font-size="11" text-anchor="middle">quality checks. Goal</text><text x="454" y="178" fill="#ccc" font-size="11" text-anchor="middle">never changes: keep</text><text x="454" y="194" fill="#ccc" font-size="11" text-anchor="middle">the data flowing.</text><line x1="400" x2="508" y1="210" y2="210" stroke="#10B981" stroke-width=".5" opacity=".4"/><rect width="108" height="32" x="400" y="222" fill="#0d3d24" stroke="#10B981" stroke-width=".5" rx="6"/><text x="454" y="243" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">SLA-Driven Flow</text><rect width="148" height="220" x="550" y="56" fill="#2a1a2e" stroke="#A855F7" stroke-width="1" rx="10"/><text x="624" y="82" fill="#C4B5FD" font-size="13" font-weight="bold" text-anchor="middle">Mixed Project</text><text x="624" y="98" fill="#C4B5FD" font-size="13" font-weight="bold" text-anchor="middle">+ Operations</text><line x1="570" x2="678" y1="110" y2="110" stroke="#A855F7" stroke-width=".5" opacity=".4"/><text x="624" y="130" fill="#ccc" font-size="11" text-anchor="middle">Half planned roadmap,</text><text x="624" y="146" fill="#ccc" font-size="11" text-anchor="middle">half production support.</text><text x="624" y="162" fill="#ccc" font-size="11" text-anchor="middle">Most common scenario.</text><text x="624" y="178" fill="#ccc" font-size="11" text-anchor="middle">Breaks Scrum fastest</text><text x="624" y="194" fill="#ccc" font-size="11" text-anchor="middle">when unacknowledged.</text><line x1="570" x2="678" y1="210" y2="210" stroke="#A855F7" stroke-width=".5" opacity=".4"/><rect width="108" height="32" x="570" y="222" fill="#3d1a4a" stroke="#A855F7" stroke-width=".5" rx="6"/><text x="624" y="243" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">Hybrid Split</text><line x1="40" x2="680" y1="296" y2="296" stroke="#555" stroke-width=".5"/><text x="360" y="318" fill="#aaa" font-size="12" font-style="italic" text-anchor="middle">Most organizations have all four. Many teams deal with more than one at the same time.</text></svg>