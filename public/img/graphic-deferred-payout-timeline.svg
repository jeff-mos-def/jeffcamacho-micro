  <text x="275" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2033</text>
  <text x="275" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#cccccc">$26</text>

