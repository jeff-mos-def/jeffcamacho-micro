  <text x="685" y="173" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ffffff">$68</text>

  <!-- Legend -->
  <rect x="52" y="400" width="12" height="12" rx="2" fill="#c0392b"/>
  <text x="70" y="410" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cccccc">Ohtani ($68M/yr)</text>
  <rect x="180" y="400" width="12" height="12" rx="2" fill="#4a6fa5"/>
  <text x="198" y="410" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cccccc">All other deferred players</text>

  <!-- Peak annotation -->
  <line x1="380" y1="72" x2="540" y2="72" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="460" y="67" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#e74c3c">Peak: ~$102M/yr</text>
