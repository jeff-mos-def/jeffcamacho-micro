  <rect x="462" y="82.4" width="36" height="285.6" rx="2" fill="#4a6fa5"/>
  <rect x="462" y="82.4" width="36" height="190.4" rx="2" fill="#c0392b"/>
  <text x="480" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2038</text>
  <text x="480" y="77" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ffffff">$102</text>

  <!-- 2039: $102M (peak) -->
  <rect x="503" y="82.4" width="36" height="285.6" rx="2" fill="#4a6fa5"/>
  <rect x="503" y="82.4" width="36" height="190.4" rx="2" fill="#c0392b"/>
  <text x="521" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2039</text>
  <text x="521" y="77" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ffffff">$102</text>

  <!-- 2040: $88M (Freeman/Hernandez done) -->
  <rect x="544" y="121.6" width="36" height="246.4" rx="2" fill="#4a6fa5"/>
  <rect x="544" y="121.6" width="36" height="190.4" rx="2" fill="#c0392b"/>
  <text x="562" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2040</text>
  <text x="562" y="117" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ffffff">$88</text>

  <!-- 2041: $82M -->
  <rect x="585" y="138.4" width="36" height="229.6" rx="2" fill="#4a6fa5"/>
  <rect x="585" y="138.4" width="36" height="190.4" rx="2" fill="#c0392b"/>
  <text x="603" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2041</text>
  <text x="603" y="134" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ffffff">$82</text>

  <!-- 2042: $76M -->
  <rect x="626" y="155.2" width="36" height="212.8" rx="2" fill="#4a6fa5"/>
  <rect x="626" y="155.2" width="36" height="190.4" rx="2" fill="#c0392b"/>
  <text x="644" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2042</text>
  <text x="644" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ffffff">$76</text>

  <!-- 2043: $68M (Ohtani only) -->
  <rect x="667" y="177.6" width="36" height="190.4" rx="2" fill="#c0392b"/>
