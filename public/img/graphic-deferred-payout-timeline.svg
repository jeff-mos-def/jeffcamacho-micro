<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="Dodgers Deferred Payout Timeline 2028 through 2043 showing annual obligations peaking at over 100 million in 2038 to 2039">
  <rect width="720" height="420" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Dodgers Deferred Payout Obligations (2028-2043)</text>
  <text x="360" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#aaaaaa">Annual deferred salary payments in millions. Ohtani highlighted.</text>

  <!-- Y-axis labels -->
  <text x="38" y="92" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#aaaaaa">$100M</text>
  <text x="38" y="152" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#aaaaaa">$80M</text>
  <text x="38" y="212" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#aaaaaa">$60M</text>
  <text x="38" y="272" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#aaaaaa">$40M</text>
  <text x="38" y="332" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#aaaaaa">$20M</text>

  <!-- Grid lines -->
  <line x1="44" y1="88" x2="700" y2="88" stroke="#333355" stroke-width="0.5"/>
  <line x1="44" y1="148" x2="700" y2="148" stroke="#333355" stroke-width="0.5"/>
  <line x1="44" y1="208" x2="700" y2="208" stroke="#333355" stroke-width="0.5"/>
  <line x1="44" y1="268" x2="700" y2="268" stroke="#333355" stroke-width="0.5"/>
  <line x1="44" y1="328" x2="700" y2="328" stroke="#333355" stroke-width="0.5"/>
  <!-- Baseline -->
  <line x1="44" y1="368" x2="700" y2="368" stroke="#555577" stroke-width="1"/>

  <!-- Bars: each bar is 36px wide with 5px gap. Start x=52. Height: $1M = 2.8px from baseline y=368 -->
  <!-- 2028: $4M (Freeman only) -->
  <rect x="52" y="356.8" width="36" height="11.2" rx="2" fill="#4a6fa5"/>
  <text x="70" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2028</text>
  <text x="70" y="352" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#cccccc">$4</text>

  <!-- 2029: $4M -->
  <rect x="93" y="356.8" width="36" height="11.2" rx="2" fill="#4a6fa5"/>
  <text x="111" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2029</text>
  <text x="111" y="352" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#cccccc">$4</text>

  <!-- 2030: $14M (Freeman + Hernandez) -->
  <rect x="134" y="328.8" width="36" height="39.2" rx="2" fill="#4a6fa5"/>
  <text x="152" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2030</text>
  <text x="152" y="324" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#cccccc">$14</text>

  <!-- 2031: $14M -->
  <rect x="175" y="328.8" width="36" height="39.2" rx="2" fill="#4a6fa5"/>
  <text x="193" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2031</text>
  <text x="193" y="324" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#cccccc">$14</text>

  <!-- 2032: $14M -->
  <rect x="216" y="328.8" width="36" height="39.2" rx="2" fill="#4a6fa5"/>
  <text x="234" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2032</text>
  <text x="234" y="324" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#cccccc">$14</text>

