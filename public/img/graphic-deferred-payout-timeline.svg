  <text x="398" y="388" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">2036</text>
  <text x="398" y="77" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ffffff">$102</text>

