<svg xmlns="http://www.w3.org/2000/svg" aria-label="Deferred Cost Risk Register showing standard fields plus extended fields for time horizon, growth rate, projected exposure, and trigger conditions" role="img" viewBox="0 0 720 340"><rect width="720" height="340" fill="#1a1a2e" rx="8"/><text x="360" y="30" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Deferred Cost Risk Register: Extended Fields</text><text x="360" y="48" fill="#aaa" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Standard risk register fields plus deferred-cost-specific extensions.</text><rect width="320" height="240" x="20" y="66" fill="#224" stroke="#446" stroke-width="1" rx="6"/><text x="180" y="88" fill="#ccc" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">STANDARD FIELDS</text><line x1="40" x2="320" y1="96" y2="96" stroke="#446" stroke-width=".5"/><text x="40" y="118" fill="#ddd" font-family="Inter, system-ui, sans-serif" font-size="11">Risk ID</text><text x="40" y="142" fill="#ddd" font-family="Inter, system-ui, sans-serif" font-size="11">Description</text><text x="40" y="166" fill="#ddd" font-family="Inter, system-ui, sans-serif" font-size="11">Category</text><text x="40" y="190" fill="#ddd" font-family="Inter, system-ui, sans-serif" font-size="11">Probability</text><text x="40" y="214" fill="#ddd" font-family="Inter, system-ui, sans-serif" font-size="11">Impact</text><text x="40" y="238" fill="#ddd" font-family="Inter, system-ui, sans-serif" font-size="11">Risk Score</text><text x="40" y="262" fill="#ddd" font-family="Inter, system-ui, sans-serif" font-size="11">Owner</text><text x="40" y="286" fill="#ddd" font-family="Inter, system-ui, sans-serif" font-size="11">Response Strategy</text><circle cx="30" cy="114" r="3" fill="#4a6fa5"/><circle cx="30" cy="138" r="3" fill="#4a6fa5"/><circle cx="30" cy="162" r="3" fill="#4a6fa5"/><circle cx="30" cy="186" r="3" fill="#4a6fa5"/><circle cx="30" cy="210" r="3" fill="#4a6fa5"/><circle cx="30" cy="234" r="3" fill="#4a6fa5"/><circle cx="30" cy="258" r="3" fill="#4a6fa5"/><circle cx="30" cy="282" r="3" fill="#4a6fa5"/><line x1="345" x2="375" y1="186" y2="186" stroke="#e74c3c" stroke-width="2" marker-end="url(#redarrow)"/><text x="360" y="178" fill="#e74c3c" font-family="Inter, system-ui, sans-serif" font-size="20" text-anchor="middle">+</text><defs><marker id="redarrow" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3"><polygon fill="#e74c3c" points="0 0 8 3 0 6"/></marker></defs><rect width="320" height="240" x="380" y="66" fill="#2a1a1a" stroke="#c0392b" stroke-width="1.5" rx="6"/><text x="540" y="88" fill="#e74c3c" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">DEFERRED COST EXTENSIONS</text><line x1="400" x2="680" y1="96" y2="96" stroke="#5a3333" stroke-width=".5"/><circle cx="390" cy="114" r="3" fill="#c0392b"/><text x="400" y="118" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Time Horizon</text><text x="400" y="132" fill="#aaa" font-family="Inter, system-ui, sans-serif" font-size="9">When does the liability crystallize?</text><circle cx="390" cy="154" r="3" fill="#c0392b"/><text x="400" y="158" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Growth Rate</text><text x="400" y="172" fill="#aaa" font-family="Inter, system-ui, sans-serif" font-size="9">How does it compound? (%, annual)</text><circle cx="390" cy="194" r="3" fill="#c0392b"/><text x="400" y="198" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Projected Exposure</text><text x="400" y="212" fill="#aaa" font-family="Inter, system-ui, sans-serif" font-size="9">Current vs. 1yr / 3yr / 5yr estimates</text><circle cx="390" cy="234" r="3" fill="#c0392b"/><text x="400" y="238" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Trigger Conditions</text><text x="400" y="252" fill="#aaa" font-family="Inter, system-ui, sans-serif" font-size="9">What forces payment / remediation?</text><circle cx="390" cy="274" r="3" fill="#c0392b"/><text x="400" y="278" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Regulatory Dependency</text><text x="400" y="292" fill="#aaa" font-family="Inter, system-ui, sans-serif" font-size="9">Can governing rules change the calculus?</text><line x1="20" x2="700" y1="316" y2="316" stroke="#446" stroke-width=".5"/><text x="360" y="332" fill="#aaa" font-family="Inter, system-ui, sans-serif" font-size="10" font-style="italic" text-anchor="middle">Track Total Deferred Cost Exposure (TDCE) at the portfolio level with a period-over-period growth rate metric.</text></svg>