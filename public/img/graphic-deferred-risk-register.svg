<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="Deferred Cost Risk Register showing standard fields plus extended fields for time horizon, growth rate, projected exposure, and trigger conditions">
  <rect width="720" height="340" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Deferred Cost Risk Register: Extended Fields</text>
  <text x="360" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#aaaaaa">Standard risk register fields plus deferred-cost-specific extensions.</text>

  <!-- Left block: Standard Fields -->
  <rect x="20" y="66" width="320" height="240" rx="6" fill="#222244" stroke="#444466" stroke-width="1"/>
  <text x="180" y="88" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#cccccc">STANDARD FIELDS</text>
  <line x1="40" y1="96" x2="320" y2="96" stroke="#444466" stroke-width="0.5"/>

  <text x="40" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#dddddd">Risk ID</text>
  <text x="40" y="142" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#dddddd">Description</text>
  <text x="40" y="166" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#dddddd">Category</text>
  <text x="40" y="190" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#dddddd">Probability</text>
  <text x="40" y="214" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#dddddd">Impact</text>
  <text x="40" y="238" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#dddddd">Risk Score</text>
  <text x="40" y="262" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#dddddd">Owner</text>
  <text x="40" y="286" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#dddddd">Response Strategy</text>

  <!-- Dots for standard fields -->
  <circle cx="30" cy="114" r="3" fill="#4a6fa5"/>
  <circle cx="30" cy="138" r="3" fill="#4a6fa5"/>
  <circle cx="30" cy="162" r="3" fill="#4a6fa5"/>
  <circle cx="30" cy="186" r="3" fill="#4a6fa5"/>
  <circle cx="30" cy="210" r="3" fill="#4a6fa5"/>
  <circle cx="30" cy="234" r="3" fill="#4a6fa5"/>
  <circle cx="30" cy="258" r="3" fill="#4a6fa5"/>
  <circle cx="30" cy="282" r="3" fill="#4a6fa5"/>

  <!-- Arrow connecting blocks -->
  <line x1="345" y1="186" x2="375" y2="186" stroke="#e74c3c" stroke-width="2" marker-end="url(#redarrow)"/>
  <text x="360" y="178" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#e74c3c">+</text>

  <defs>
    <marker id="redarrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Right block: Extended Fields -->
  <rect x="380" y="66" width="320" height="240" rx="6" fill="#2a1a1a" stroke="#c0392b" stroke-width="1.5"/>
  <text x="540" y="88" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#e74c3c">DEFERRED COST EXTENSIONS</text>
  <line x1="400" y1="96" x2="680" y2="96" stroke="#5a3333" stroke-width="0.5"/>

  <!-- Extended field labels + descriptions -->
  <circle cx="390" cy="114" r="3" fill="#c0392b"/>
  <text x="400" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Time Horizon</text>
  <text x="400" y="132" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">When does the liability crystallize?</text>

  <circle cx="390" cy="154" r="3" fill="#c0392b"/>
  <text x="400" y="158" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Growth Rate</text>
  <text x="400" y="172" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">How does it compound? (%, annual)</text>

  <circle cx="390" cy="194" r="3" fill="#c0392b"/>
  <text x="400" y="198" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Projected Exposure</text>
  <text x="400" y="212" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">Current vs. 1yr / 3yr / 5yr estimates</text>

  <circle cx="390" cy="234" r="3" fill="#c0392b"/>
  <text x="400" y="238" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Trigger Conditions</text>
  <text x="400" y="252" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">What forces payment / remediation?</text>

  <circle cx="390" cy="274" r="3" fill="#c0392b"/>
  <text x="400" y="278" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Regulatory Dependency</text>
  <text x="400" y="292" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#aaaaaa">Can governing rules change the calculus?</text>

  <!-- Footer -->
  <line x1="20" y1="316" x2="700" y2="316" stroke="#444466" stroke-width="0.5"/>
  <text x="360" y="332" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#aaaaaa" font-style="italic">Track Total Deferred Cost Exposure (TDCE) at the portfolio level with a period-over-period growth rate metric.</text>
</svg>
