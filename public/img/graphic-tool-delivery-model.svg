<svg xmlns="http://www.w3.org/2000/svg" width="100%" font-family="Georgia, serif" viewBox="0 0 680 400"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="8" refY="5" viewBox="0 0 10 10"><path fill="none" stroke="#888" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2 1L8 5L2 9"/></marker></defs><text x="40" y="28" fill="#fff" font-family="Georgia, serif" font-size="12">Delivery model</text><text x="230" y="28" fill="#fff" font-family="Georgia, serif" font-size="12">What your tooling must support</text><rect width="160" height="44" x="40" y="44" fill="#1a3a5c" stroke="#378ADD" stroke-width=".5" rx="8"/><text x="120" y="71" fill="#85B7EB" font-family="Georgia, serif" font-size="14" font-weight="bold" text-anchor="middle">Waterfall</text><line x1="200" x2="226" y1="66" y2="66" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/><rect width="410" height="44" x="230" y="44" fill="#1e1e1e" stroke="#444" stroke-width=".5" rx="8"/><text x="246" y="63" fill="#ddd" font-family="Georgia, serif" font-size="12">Gantt charts · milestone tracking · dependency mapping</text><text x="246" y="79" fill="#ddd" font-family="Georgia, serif" font-size="12">resource loading · baseline vs. actual</text><rect width="160" height="44" x="40" y="104" fill="#0d3328" stroke="#1D9E75" stroke-width=".5" rx="8"/><text x="120" y="131" fill="#5DCAA5" font-family="Georgia, serif" font-size="14" font-weight="bold" text-anchor="middle">Scrum</text><line x1="200" x2="226" y1="126" y2="126" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/><rect width="410" height="44" x="230" y="104" fill="#1e1e1e" stroke="#444" stroke-width=".5" rx="8"/><text x="246" y="123" fill="#ddd" font-family="Georgia, serif" font-size="12">Sprint boards · backlog management</text><text x="246" y="139" fill="#ddd" font-family="Georgia, serif" font-size="12">velocity tracking · burndown charts</text><rect width="160" height="44" x="40" y="164" fill="#3d2a08" stroke="#BA7517" stroke-width=".5" rx="8"/><text x="120" y="191" fill="#FAC775" font-family="Georgia, serif" font-size="14" font-weight="bold" text-anchor="middle">Kanban</text><line x1="200" x2="226" y1="186" y2="186" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/><rect width="410" height="44" x="230" y="164" fill="#1e1e1e" stroke="#444" stroke-width=".5" rx="8"/><text x="246" y="183" fill="#ddd" font-family="Georgia, serif" font-size="12">WIP limits · flow metrics</text><text x="246" y="199" fill="#ddd" font-family="Georgia, serif" font-size="12">queue visualization · cycle time</text><rect width="160" height="44" x="40" y="224" fill="#1e1a3d" stroke="#7F77DD" stroke-width=".5" rx="8"/><text x="120" y="251" fill="#AFA9EC" font-family="Georgia, serif" font-size="14" font-weight="bold" text-anchor="middle">Hybrid</text><line x1="200" x2="226" y1="246" y2="246" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/><rect width="410" height="44" x="230" y="224" fill="#1e1e1e" stroke="#444" stroke-width=".5" rx="8"/><text x="246" y="243" fill="#ddd" font-family="Georgia, serif" font-size="12">Flexibility across views · cross-functional reporting</text><text x="246" y="259" fill="#ddd" font-family="Georgia, serif" font-size="12">portfolio-level visibility</text><rect width="160" height="44" x="40" y="284" fill="#3d1a0a" stroke="#D85A30" stroke-width=".5" rx="8"/><text x="120" y="311" fill="#F0997B" font-family="Georgia, serif" font-size="14" font-weight="bold" text-anchor="middle">Scaled Agile (SAFe)</text><line x1="200" x2="226" y1="306" y2="306" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/><rect width="410" height="44" x="230" y="284" fill="#1e1e1e" stroke="#444" stroke-width=".5" rx="8"/><text x="246" y="303" fill="#ddd" font-family="Georgia, serif" font-size="12">Program board · PI objectives · ART-level reporting</text><text x="246" y="319" fill="#ddd" font-family="Georgia, serif" font-size="12">dependency tracking across teams</text><line 