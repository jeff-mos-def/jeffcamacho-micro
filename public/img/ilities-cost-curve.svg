<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Cost curve showing the exponential increase in cost to fix non-functional requirements as they are addressed later in the delivery lifecycle">
  <title>The Cost of Fixing an "ility" Over Time</title>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">The Cost of Fixing an "ility" Over Time</text>
  <text x="400" y="62" font-family="Arial, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">deferred non-functional work compounds, fast</text>

  <!-- Y axis -->
  <line x1="100" y1="100" x2="100" y2="400" stroke="#aaaaaa" stroke-width="2"/>
  <!-- X axis -->
  <line x1="100" y1="400" x2="720" y2="400" stroke="#aaaaaa" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="60" y="250" font-family="Arial, sans-serif" font-size="13" fill="#dddddd" text-anchor="middle" transform="rotate(-90, 60, 250)">Cost to Fix</text>

  <!-- Y axis tick marks and labels -->
  <line x1="95" y1="390" x2="100" y2="390" stroke="#aaaaaa" stroke-width="1"/>
  <text x="88" y="394" font-family="Arial, sans-serif" font-size="11" fill="#aaaaaa" text-anchor="end">1x</text>

  <line x1="95" y1="340" x2="100" y2="340" stroke="#aaaaaa" stroke-width="1"/>
  <text x="88" y="344" font-family="Arial, sans-serif" font-size="11" fill="#aaaaaa" text-anchor="end">5x</text>

  <line x1="95" y1="260" x2="100" y2="260" stroke="#aaaaaa" stroke-width="1"/>
  <text x="88" y="264" font-family="Arial, sans-serif" font-size="11" fill="#aaaaaa" text-anchor="end">25x</text>

  <line x1="95" y1="160" x2="100" y2="160" stroke="#aaaaaa" stroke-width="1"/>
  <text x="88" y="164" font-family="Arial, sans-serif" font-size="11" fill="#aaaaaa" text-anchor="end">100x+</text>

  <!-- X axis label -->
  <text x="410" y="470" font-family="Arial, sans-serif" font-size="13" fill="#dddddd" text-anchor="middle">When the "ility" Gets Addressed</text>

  <!-- Cost curve - exponential -->
  <path d="M 130 388 Q 250 380, 320 360 Q 400 330, 480 270 Q 560 190, 650 130" stroke="#d4634a" stroke-width="3" fill="none"/>

  <!-- Phase markers (vertical guidelines) -->
  <line x1="180" y1="100" x2="180" y2="400" stroke="#444444" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="320" y1="100" x2="320" y2="400" stroke="#444444" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="480" y1="100" x2="480" y2="400" stroke="#444444" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="640" y1="100" x2="640" y2="400" stroke="#444444" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Phase labels -->
  <text x="180" y="420" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Design</text>
  <text x="320" y="420" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Development</text>
  <text x="480" y="420" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Testing / UAT</text>
  <text x="640" y="420" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Production</text>

  <!-- Data points on curve -->
  <circle cx="180" cy="385" r="6" fill="#5a8fb0" stroke="#ffffff" stroke-width="2"/>
  <circle cx="320" cy="358" r="6" fill="#7a9b6a" stroke="#ffffff" stroke-width="2"/>
  <circle cx="480" cy="270" r="6" fill="#c89a4a" stroke="#ffffff" stroke-width="2"/>
  <circle cx="640" cy="135" r="6" fill="#d4634a" stroke="#ffffff" stroke-width="2"/>

  <!-- Annotations beside data points -->
  <text x="195" y="377" font-family="Arial, sans-serif" font-size="11" fill="#dddddd">scoped, estimated, owned</text>

  <text x="335" y="350" font-family="Arial, sans-serif" font-size="11" fill="#dddddd">refactor, retest, re-estimate</text>

  <text x="350" y="265" font-family="Arial, sans-serif" font-size="11" fill="#dddddd" text-anchor="end">architecture rework</text>
  <text x="350" y="280" font-family="Arial, sans-serif" font-size="11" fill="#dddddd" text-anchor="end">under deadline pressure</text>

  <text x="630" y="115" font-family="Arial, sans-serif" font-size="11" fill="#dddddd" text-anchor="end">incident response,</text>
  <text x="630" y="100" font-family="Arial, sans-serif" font-size="11" fill="#dddddd" text-anchor="end">breach exposure,</text>
  <text x="630" y="85" font-family="Arial, sans-serif" font-size="11" fill="#dddddd" text-anchor="end">unplanned rewrite</text>

  <!-- Footer -->
  <text x="400" y="490" font-family="Arial, sans-serif" font-size="11" fill="#aaaaaa" text-anchor="middle" font-style="italic">Every phase you defer, the cost multiplies. By production, "we'll handle it later" is a budget line item with executive attention.</text>
</svg>
