<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Iceberg diagram showing functional requirements above the waterline and non-functional requirements below">
  <title>Functional vs Non-Functional Requirements Iceberg</title>

  <!-- Sky / above water background -->
  <rect x="0" y="0" width="800" height="240" fill="#1a2332"/>

  <!-- Water / below waterline background -->
  <rect x="0" y="240" width="800" height="360" fill="#0d1620"/>

  <!-- Waterline -->
  <line x1="0" y1="240" x2="800" y2="240" stroke="#4a90a4" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="20" y="232" font-family="Arial, sans-serif" font-size="13" fill="#aaaaaa" font-style="italic">waterline (what stakeholders see)</text>

  <!-- Iceberg tip (above water) -->
  <polygon points="400,80 320,240 480,240" fill="#5a8fb0" stroke="#7eb3d4" stroke-width="2"/>

  <!-- Iceberg body (below water) -->
  <polygon points="320,240 480,240 580,420 540,540 260,540 220,420" fill="#2d5470" stroke="#4a90a4" stroke-width="2" opacity="0.9"/>

  <!-- Above water label -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Functional Requirements</text>
  <text x="400" y="72" font-family="Arial, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">what the system does</text>

  <!-- Above water examples -->
  <text x="400" y="140" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Login</text>
  <text x="400" y="165" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Search</text>
  <text x="400" y="190" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Checkout</text>
  <text x="400" y="215" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Generate Report</text>

  <!-- Below water title -->
  <text x="400" y="280" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Non-Functional Requirements</text>
  <text x="400" y="302" font-family="Arial, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">how the system behaves</text>

  <!-- Below water ilities - arranged in three columns -->
  <!-- Column 1 -->
  <text x="290" y="340" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Reliability</text>
  <text x="290" y="365" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Availability</text>
  <text x="290" y="390" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Scalability</text>
  <text x="290" y="415" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Performance</text>

  <!-- Column 2 -->
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Security</text>
  <text x="400" y="365" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Maintainability</text>
  <text x="400" y="390" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Usability</text>
  <text x="400" y="415" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Accessibility</text>

  <!-- Column 3 -->
  <text x="510" y="340" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Observability</text>
  <text x="510" y="365" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Recoverability</text>
  <text x="510" y="390" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Interoperability</text>
  <text x="510" y="415" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Compliance</text>

  <!-- Bottom warning text -->
  <text x="400" y="475" font-family="Arial, sans-serif" font-size="14" fill="#dddddd" text-anchor="middle" font-style="italic">where projects quietly sink</text>

  <!-- Footer caption -->
  <text x="400" y="585" font-family="Arial, sans-serif" font-size="11" fill="#aaaaaa" text-anchor="middle">Functional requirements get demoed. Non-functional requirements decide whether the product survives production.</text>
</svg>
