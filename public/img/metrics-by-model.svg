<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 720 340"><text x="360" y="24" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">Right Metrics for the Right Model</text><line x1="40" x2="680" y1="38" y2="38" stroke="#555" stroke-width=".5"/><text x="130" y="62" fill="#fff" font-size="12" text-anchor="middle">Delivery Model</text><text x="420" y="62" fill="#fff" font-size="12" text-anchor="middle">Primary Metrics</text><rect width="180" height="48" x="40" y="76" fill="#1e3a5f" stroke="#3B82F6" stroke-width=".5" rx="8"/><text x="130" y="105" fill="#7BB8F5" font-size="13" font-weight="bold" text-anchor="middle">Scrum</text><line x1="220" x2="246" y1="100" y2="100" stroke="#aaa" stroke-width="1"/><rect width="430" height="48" x="250" y="76" fill="#1e1e1e" stroke="#444" stroke-width=".5" rx="8"/><text x="266" y="97" fill="#ddd" font-size="11">Velocity · Sprint burndown · Commitment reliability</text><text x="266" y="115" fill="#888" font-size="11">Goal: Predictable feature delivery per timebox</text><rect width="180" height="48" x="40" y="140" fill="#3d2508" stroke="#D97706" stroke-width=".5" rx="8"/><text x="130" y="169" fill="#FBBF24" font-size="13" font-weight="bold" text-anchor="middle">Kanban</text><line x1="220" x2="246" y1="164" y2="164" stroke="#aaa" stroke-width="1"/><rect width="430" height="48" x="250" y="140" fill="#1e1e1e" stroke="#444" stroke-width=".5" rx="8"/><text x="266" y="161" fill="#ddd" font-size="11">Cycle time · Throughput · WIP age · Queue depth</text><text x="266" y="179" fill="#888" font-size="11">Goal: Smooth flow, fast resolution</text><rect width="180" height="48" x="40" y="204" fill="#0d3d24" stroke="#10B981" stroke-width=".5" rx="8"/><text x="130" y="233" fill="#6EE7B7" font-size="13" font-weight="bold" text-anchor="middle">SLA-Driven Flow</text><line x1="220" x2="246" y1="228" y2="228" stroke="#aaa" stroke-width="1"/><rect width="430" height="48" x="250" y="204" fill="#1e1e1e" stroke="#444" stroke-width=".5" rx="8"/><text x="266" y="225" fill="#ddd" font-size="11">Uptime % · SLA compliance · Mean time to recover</text><text x="266" y="243" fill="#888" font-size="11">Goal: System health within acceptable parameters</text><rect width="180" height="48" x="40" y="268" fill="#3d1a4a" stroke="#A855F7" stroke-width=".5" rx="8"/><text x="130" y="297" fill="#C4B5FD" font-size="13" font-weight="bold" text-anchor="middle">Hybrid Split</text><line x1="220" x2="246" y1="292" y2="292" stroke="#aaa" stroke-width="1"/><rect width="430" height="48" x="250" y="268" fill="#1e1e1e" stroke="#444" stroke-width=".5" rx="8"/><text x="266" y="289" fill="#ddd" font-size="11">Velocity (planned side) · Cycle time (reactive side) · Capacity ratio</text><text x="266" y="307" fill="#888" font-size="11">Goal: Balanced reporting across both work streams</text></svg>