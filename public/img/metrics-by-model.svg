<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Right Metrics for the Right Model</text>

  <!-- Divider -->
  <line x1="40" y1="38" x2="680" y2="38" stroke="#555" stroke-width="0.5"/>

  <!-- Column headers -->
  <text x="130" y="62" text-anchor="middle" font-size="12" fill="#ffffff">Delivery Model</text>
  <text x="420" y="62" text-anchor="middle" font-size="12" fill="#ffffff">Primary Metrics</text>

  <!-- Row 1: Scrum -->
  <rect x="40" y="76" width="180" height="48" rx="8" fill="#1e3a5f" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="130" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#7BB8F5">Scrum</text>
  <line x1="220" y1="100" x2="246" y2="100" stroke="#aaaaaa" stroke-width="1"/>
  <rect x="250" y="76" width="430" height="48" rx="8" fill="#1e1e1e" stroke="#444" stroke-width="0.5"/>
  <text x="266" y="97" font-size="11" fill="#dddddd">Velocity  ·  Sprint burndown  ·  Commitment reliability</text>
  <text x="266" y="115" font-size="11" fill="#888888">Goal: Predictable feature delivery per timebox</text>

  <!-- Row 2: Kanban -->
  <rect x="40" y="140" width="180" height="48" rx="8" fill="#3d2508" stroke="#D97706" stroke-width="0.5"/>
  <text x="130" y="169" text-anchor="middle" font-size="13" font-weight="bold" fill="#FBBF24">Kanban</text>
  <line x1="220" y1="164" x2="246" y2="164" stroke="#aaaaaa" stroke-width="1"/>
  <rect x="250" y="140" width="430" height="48" rx="8" fill="#1e1e1e" stroke="#444" stroke-width="0.5"/>
  <text x="266" y="161" font-size="11" fill="#dddddd">Cycle time  ·  Throughput  ·  WIP age  ·  Queue depth</text>
  <text x="266" y="179" font-size="11" fill="#888888">Goal: Smooth flow, fast resolution</text>

  <!-- Row 3: SLA-Driven Flow -->
  <rect x="40" y="204" width="180" height="48" rx="8" fill="#0d3d24" stroke="#10B981" stroke-width="0.5"/>
  <text x="130" y="233" text-anchor="middle" font-size="13" font-weight="bold" fill="#6EE7B7">SLA-Driven Flow</text>
  <line x1="220" y1="228" x2="246" y2="228" stroke="#aaaaaa" stroke-width="1"/>
  <rect x="250" y="204" width="430" height="48" rx="8" fill="#1e1e1e" stroke="#444" stroke-width="0.5"/>
  <text x="266" y="225" font-size="11" fill="#dddddd">Uptime %  ·  SLA compliance  ·  Mean time to recover</text>
  <text x="266" y="243" font-size="11" fill="#888888">Goal: System health within acceptable parameters</text>

  <!-- Row 4: Hybrid Split -->
  <rect x="40" y="268" width="180" height="48" rx="8" fill="#3d1a4a" stroke="#A855F7" stroke-width="0.5"/>
  <text x="130" y="297" text-anchor="middle" font-size="13" font-weight="bold" fill="#C4B5FD">Hybrid Split</text>
  <line x1="220" y1="292" x2="246" y2="292" stroke="#aaaaaa" stroke-width="1"/>
  <rect x="250" y="268" width="430" height="48" rx="8" fill="#1e1e1e" stroke="#444" stroke-width="0.5"/>
  <text x="266" y="289" font-size="11" fill="#dddddd">Velocity (planned side)  ·  Cycle time (reactive side)  ·  Capacity ratio</text>
  <text x="266" y="307" font-size="11" fill="#888888">Goal: Balanced reporting across both work streams</text>

</svg>
