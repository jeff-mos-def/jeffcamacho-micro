<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" role="img" aria-label="Perverse Incentive Loop: Rule creates behavior, behavior creates outcome, outcome triggers redesign, redesign creates new rule">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#ffffff">The perverse incentive loop</text>

  <!-- Guide circle (subtle dashed) -->
  <circle cx="340" cy="270" r="170" fill="none" stroke="#d1d5db" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Arc arrows clockwise: top>right, right>bottom, bottom>left, left>top -->
  <path d="M 396 104 A 170 170 0 0 1 506 216" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 506 324 A 170 170 0 0 1 396 436" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 284 436 A 170 170 0 0 1 174 324" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 174 216 A 170 170 0 0 1 284 104" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Top: Rule / Policy (12 o'clock) -->
  <rect x="240" y="72" width="200" height="44" rx="22" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>
  <text x="340" y="94" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff">Rule / policy</text>

  <!-- Right: Rational Behavior (3 o'clock) -->
  <rect x="420" y="248" width="200" height="44" rx="22" fill="#085041" stroke="#085041" stroke-width="0.5"/>
  <text x="520" y="270" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff">Rational behavior</text>

  <!-- Bottom: Unintended Outcome (6 o'clock) -->
  <rect x="240" y="424" width="200" height="44" rx="22" fill="#a32d2d" stroke="#a32d2d" stroke-width="0.5"/>
  <text x="340" y="446" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff">Unintended outcome</text>

  <!-- Left: System Redesign (9 o'clock) -->
  <rect x="60" y="248" width="200" height="44" rx="22" fill="#185fa5" stroke="#185fa5" stroke-width="0.5"/>
  <text x="160" y="270" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff">System redesign</text>

  <!-- Arrow labels -->
  <text x="476" y="156" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9ca3af" font-style="italic">creates</text>
  <text x="476" y="392" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9ca3af" font-style="italic">produces</text>
  <text x="204" y="392" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9ca3af" font-style="italic">triggers</text>
  <text x="204" y="156" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9ca3af" font-style="italic">generates new</text>

  <!-- Caption -->
  <text x="340" y="510" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af">Service time rule &#x2192; Hold Bryant in minors &#x2192; Lost value on Opening Day &#x2192; CBA redesigns incentives</text>
</svg>
