<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 440">
<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #D3D1C7; }
  .ts { font-size: 12px; font-weight: 400; fill: #B4B2A9; }
  .track { fill: #F1EFE8; stroke: #B4B2A9; }
  .tick { stroke: #888780; stroke-width: 0.5; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
  .teal-text { fill: #085041; }
  .teal-sub { fill: #0F6E56; }
  .blue-fill { fill: #E6F1FB; stroke: #185FA5; }
  .blue-text { fill: #0C447C; }
  .blue-sub { fill: #185FA5; }
  .coral-fill { fill: #FAECE7; stroke: #993C1D; }
  .coral-text { fill: #712B13; }
  .coral-sub { fill: #993C1D; }
  .pink-fill { fill: #FBEAF0; stroke: #993556; }
  .pink-text { fill: #72243E; }
  .pink-sub { fill: #993556; }
  .amber-fill { fill: #FAEEDA; stroke: #854F0B; }
  .amber-text { fill: #633806; }
  .amber-sub { fill: #854F0B; }
</style>
<text class="th" x="340" y="30" text-anchor="middle">Typical PI cycle (~10 weeks)</text>
<rect x="40" y="50" width="600" height="8" rx="4" class="track" stroke-width="0.5"/>
<line x1="40" y1="54" x2="40" y2="68" class="tick"/>
<text class="ts" x="40" y="82" text-anchor="middle">Wk 0</text>
<line x1="160" y1="54" x2="160" y2="68" class="tick"/>
<text class="ts" x="160" y="82" text-anchor="middle">Wk 2</text>
<line x1="280" y1="54" x2="280" y2="68" class="tick"/>
<text class="ts" x="280" y="82" text-anchor="middle">Wk 4</text>
<line x1="400" y1="54" x2="400" y2="68" class="tick"/>
<text class="ts" x="400" y="82" text-anchor="middle">Wk 6</text>
<line x1="520" y1="54" x2="520" y2="68" class="tick"/>
<text class="ts" x="520" y="82" text-anchor="middle">Wk 8</text>
<line x1="640" y1="54" x2="640" y2="68" class="tick"/>
<text class="ts" x="640" y="82" text-anchor="middle">Wk 10</text>
<rect x="40" y="100" width="120" height="44" rx="8" class="teal-fill" stroke-width="0.5"/>
<text class="th teal-text" x="100" y="115" text-anchor="middle" dominant-baseline="central">PI Planning</text>
<text class="ts teal-sub" x="100" y="133" text-anchor="middle" dominant-baseline="central">2-day event</text>
<rect x="160" y="100" width="360" height="44" rx="8" class="blue-fill" stroke-width="0.5"/>
<text class="th blue-text" x="340" y="115" text-anchor="middle" dominant-baseline="central">PI Execution (iterations 1-5)</text>
<text class="ts blue-sub" x="340" y="133" text-anchor="middle" dominant-baseline="central">ART Sync, System Demos, coaching</text>
<rect x="520" y="100" width="120" height="44" rx="8" class="coral-fill" stroke-width="0.5"/>
<text class="th coral-text" x="580" y="115" text-anchor="middle" dominant-baseline="central">I&amp;A + next PI</text>
<text class="ts coral-sub" x="580" y="133" text-anchor="middle" dominant-baseline="central">Inspect &amp; Adapt</text>
<text class="th" x="40" y="180">RTE activities by phase</text>
<rect x="40" y="196" width="200" height="36" rx="6" class="teal-fill" stroke-width="0.5"/>
<text class="ts teal-sub" x="140" y="214" text-anchor="middle" dominant-baseline="central">Backlog readiness check</text>
<rect x="250" y="196" width="200" height="36" rx="6" class="teal-fill" stroke-width="0.5"/>
<text class="ts teal-sub" x="350" y="214" text-anchor="middle" dominant-baseline="central">Facilitate planning event</text>
<rect x="460" y="196" width="180" height="36" rx="6" class="teal-fill" stroke-width="0.5"/>
<text class="ts teal-sub" x="550" y="214" text-anchor="middle" dominant-baseline="central">Confidence vote + close</text>
<rect x="40" y="244" width="145" height="36" rx="6" class="blue-fill" stroke-width="0.5"/>
<text class="ts blue-sub" x="112" y="262" text-anchor="middle" dominant-baseline="central">ART Sync (weekly)</text>
<rect x="195" y="244" width="165" height="36" rx="6" class="blue-fill" stroke-width="0.5"/>
<text class="ts blue-sub" x="277" y="262" text-anchor="middle" dominant-baseline="central">Impediment removal</text>
<rect x="370" y="244" width="145" height="36" rx="6" class="blue-fill" stroke-width="0.5"/>
<text class="ts blue-sub" x="442" y="262" text-anchor="middle" dominant-baseline="central">System Demos</text>
<rect x="525" y="244" width="115" height="36" rx="6" class="blue-fill" stroke-width="0.5"/>
<text class="ts blue-sub" x="582" y="262" text-anchor="middle" dominant-baseline="central">ROAM risks</text>
<rect x="40" y="292" width="145" height="36" rx="6" class="pink-fill" stroke-width="0.5"/>
<text class="ts pink-sub" x="112" y="310" text-anchor="middle" dominant-baseline="central">Coach Syncs</text>
<rect x="195" y="292" width="195" height="36" rx="6" class="pink-fill" stroke-width="0.5"/>
<text class="ts pink-sub" x="292" y="310" text-anchor="middle" dominant-baseline="central">Powerful questions + 1:1s</text>
<rect x="400" y="292" width="240" height="36" rx="6" class="pink-fill" stroke-width="0.5"/>
<text class="ts pink-sub" x="520" y="310" text-anchor="middle" dominant-baseline="central">SM/TC facilitation coaching</text>
<rect x="40" y="340" width="170" height="36" rx="6" class="coral-fill" stroke-width="0.5"/>
<text class="ts coral-sub" x="125" y="358" text-anchor="middle" dominant-baseline="central">Flow metrics review</text>
<rect x="220" y="340" width="200" height="36" rx="6" class="coral-fill" stroke-width="0.5"/>
<text class="ts coral-sub" x="320" y="358" text-anchor="middle" dominant-baseline="central">Value stream mapping</text>
<rect x="430" y="340" width="210" height="36" rx="6" class="coral-fill" stroke-width="0.5"/>
<text class="ts coral-sub" x="535" y="358" text-anchor="middle" dominant-baseline="central">Dependency elimination</text>
<rect x="40" y="388" width="200" height="36" rx="6" class="amber-fill" stroke-width="0.5"/>
<text class="ts amber-sub" x="140" y="406" text-anchor="middle" dominant-baseline="central">Inspect &amp; Adapt workshop</text>
<rect x="250" y="388" width="190" height="36" rx="6" class="amber-fill" stroke-width="0.5"/>
<text class="ts amber-sub" x="345" y="406" text-anchor="middle" dominant-baseline="central">SAFe assessments</text>
<rect x="450" y="388" width="190" height="36" rx="6" class="amber-fill" stroke-width="0.5"/>
<text class="ts amber-sub" x="545" y="406" text-anchor="middle" dominant-baseline="central">VMO/LACE collaboration</text>
</svg>