<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 500"><style>text{font-family:system-ui,-apple-system,sans-serif}.th{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}.label{fill:#d3d1c7}.purple-fill{fill:#eeedfe;stroke:#534ab7}.purple-text{fill:#3c3489}.purple-sub{fill:#534ab7}.teal-fill{fill:#e1f5ee;stroke:#0f6e56}.teal-text{fill:#085041}.teal-sub{fill:#0f6e56}.coral-fill{fill:#faece7;stroke:#993c1d}.coral-text{fill:#712b13}.coral-sub{fill:#993c1d}</style><rect width="180" height="44" x="40" y="40" stroke-width=".5" class="purple-fill" rx="8"/><text x="130" y="62" class="th purple-text" dominant-baseline="central" text-anchor="middle">Project Manager</text><rect width="180" height="44" x="250" y="40" stroke-width=".5" class="teal-fill" rx="8"/><text x="340" y="62" class="th teal-text" dominant-baseline="central" text-anchor="middle">Scrum Master</text><rect width="180" height="44" x="460" y="40" stroke-width=".5" class="coral-fill" rx="8"/><text x="550" y="62" class="th coral-text" dominant-baseline="central" text-anchor="middle">RTE</text><text x="40" y="120" class="th label" dominant-baseline="central">Scope</text><rect width="180" height="36" x="40" y="134" stroke-width=".5" class="purple-fill" rx="6"/><text x="130" y="152" class="ts purple-sub" dominant-baseline="central" text-anchor="middle">Single project</text><rect width="180" height="36" x="250" y="134" stroke-width=".5" class="teal-fill" rx="6"/><text x="340" y="152" class="ts teal-sub" dominant-baseline="central" text-anchor="middle">Single team</text><rect width="180" height="36" x="460" y="134" stroke-width=".5" class="coral-fill" rx="6"/><text x="550" y="152" class="ts coral-sub" dominant-baseline="central" text-anchor="middle">Entire ART (5-12 teams)</text><text x="40" y="200" class="th label" dominant-baseline="central">Primary focus</text><rect width="180" height="36" x="40" y="214" stroke-width=".5" class="purple-fill" rx="6"/><text x="130" y="232" class="ts purple-sub" dominant-baseline="central" text-anchor="middle">Scope, schedule, budget</text><rect width="180" height="36" x="250" y="214" stroke-width=".5" class="teal-fill" rx="6"/><text x="340" y="232" class="ts teal-sub" dominant-baseline="central" text-anchor="middle">Team effectiveness</text><rect width="180" height="36" x="460" y="214" stroke-width=".5" class="coral-fill" rx="6"/><text x="550" y="232" class="ts coral-sub" dominant-baseline="central" text-anchor="middle">ART value flow</text><text x="40" y="280" class="th label" dominant-baseline="central">Key events</text><rect width="180" height="36" x="40" y="294" stroke-width=".5" class="purple-fill" rx="6"/><text x="130" y="312" class="ts purple-sub" dominant-baseline="central" text-anchor="middle">Status, gates, steering</text><rect width="180" height="36" x="250" y="294" stroke-width=".5" class="teal-fill" rx="6"/><text x="340" y="312" class="ts teal-sub" dominant-baseline="central" text-anchor="middle">Sprint ceremonies</text><rect width="180" height="36" x="460" y="294" stroke-width=".5" class="coral-fill" rx="6"/><text x="550" y="312" class="ts coral-sub" dominant-baseline="central" text-anchor="middle">PI Planning, ART Sync, I&amp;A</text><text x="40" y="360" class="th label" dominant-baseline="central">Stakeholders</text><rect width="180" height="36" x="40" y="374" stroke-width=".5" class="purple-fill" rx="6"/><text x="130" y="392" class="ts purple-sub" dominant-baseline="central" text-anchor="middle">Sponsor, steering cmte</text><rect width="180" height="36" x="250" y="374" stroke-width=".5" class="teal-fill" rx="6"/><text x="340" y="392" class="ts teal-sub" dominant-baseline="central" text-anchor="middle">Product Owner, team</text><rect width="180" height="36" x="460" y="374" stroke-width=".5" class="coral-fill" rx="6"/><text x="550" y="392" class="ts coral-sub" dominant-baseline="central" text-anchor="middle">Business Owners, PMs, SAs</text><text x="40" y="440" class="th label" dominant-baseline="central">Leadership style</text><rect width="180" height="36" x="40" y="454" stroke-width=".5" class="purple-fill" rx="6"/><text x="130" y="472" class="ts purple-sub" dominant-baseline="central" text-anchor="middle">Directive + collaborative</text><rect width="180" height="36" x="250" y="454" stroke-width=".5" class="teal-fill" rx="6"/><text x="340" y="472" class="ts teal-sub" dominant-baseline="central" text-anchor="middle">Servant leader (team)</text><rect width="180" height="36" x="460" y="454" stroke-width=".5" class="coral-fill" rx="6"/><text x="550" y="472" class="ts coral-sub" dominant-baseline="central" text-anchor="middle">Servant leader (train)</text></svg>