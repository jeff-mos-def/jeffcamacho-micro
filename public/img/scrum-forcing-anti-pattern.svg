<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">The Scrum Forcing Anti-Pattern</text>

  <!-- Divider -->
  <line x1="40" y1="38" x2="680" y2="38" stroke="#555" stroke-width="0.5"/>

  <!-- LEFT SIDE: Before -->
  <text x="185" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#F87171">Before: Scrum on service work</text>

  <!-- Sprint container -->
  <rect x="40" y="76" width="290" height="268" rx="10" fill="#1a1216" stroke="#7F1D1D" stroke-width="1"/>
  <text x="185" y="98" text-anchor="middle" font-size="12" fill="#aaaaaa">Sprint 7 plan</text>

  <!-- Planned stories -->
  <rect x="56" y="110" width="120" height="28" rx="5" fill="#1e3a5f" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="116" y="129" text-anchor="middle" font-size="10" fill="#7BB8F5">Story A (5 pts)</text>

  <rect x="56" y="144" width="120" height="28" rx="5" fill="#1e3a5f" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="116" y="163" text-anchor="middle" font-size="10" fill="#7BB8F5">Story B (3 pts)</text>

  <rect x="56" y="178" width="120" height="28" rx="5" fill="#1e3a5f" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="116" y="197" text-anchor="middle" font-size="10" fill="#7BB8F5">Story C (8 pts)</text>

  <!-- Incoming interrupts smashing into the sprint -->
  <rect x="194" y="110" width="120" height="28" rx="5" fill="#5c1a1a" stroke="#EF4444" stroke-width="0.5"/>
  <text x="254" y="129" text-anchor="middle" font-size="10" fill="#FCA5A5">P1 incident</text>

  <rect x="194" y="144" width="120" height="28" rx="5" fill="#5c1a1a" stroke="#EF4444" stroke-width="0.5"/>
  <text x="254" y="163" text-anchor="middle" font-size="10" fill="#FCA5A5">Service ticket x3</text>

  <rect x="194" y="178" width="120" height="28" rx="5" fill="#5c1a1a" stroke="#EF4444" stroke-width="0.5"/>
  <text x="254" y="197" text-anchor="middle" font-size="10" fill="#FCA5A5">Data feed outage</text>

  <rect x="194" y="212" width="120" height="28" rx="5" fill="#5c1a1a" stroke="#EF4444" stroke-width="0.5"/>
  <text x="254" y="231" text-anchor="middle" font-size="10" fill="#FCA5A5">Urgent escalation</text>

  <!-- Carryover -->
  <line x1="56" y1="258" x2="314" y2="258" stroke="#7F1D1D" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="185" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#F87171">Result: 2 of 3 stories carry over</text>
  <text x="185" y="296" text-anchor="middle" font-size="10" fill="#aaaaaa">Velocity: meaningless</text>
  <text x="185" y="312" text-anchor="middle" font-size="10" fill="#aaaaaa">Sprint commitment: fiction</text>
  <text x="185" y="328" text-anchor="middle" font-size="10" fill="#aaaaaa">Team trust in process: gone</text>

  <!-- CENTER: Arrow -->
  <text x="370" y="210" text-anchor="middle" font-size="24" fill="#aaaaaa">&#x27A1;</text>

  <!-- RIGHT SIDE: After -->
  <text x="540" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#6EE7B7">After: Kanban for service work</text>

  <!-- Kanban board -->
  <rect x="400" y="76" width="280" height="268" rx="10" fill="#0a1a14" stroke="#065F46" stroke-width="1"/>

  <!-- Column headers -->
  <text x="440" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#cccccc">Queue</text>
  <text x="530" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#cccccc">In Progress</text>
  <text x="630" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#cccccc">Done</text>

  <!-- Column lines -->
  <line x1="480" y1="86" x2="480" y2="310" stroke="#065F46" stroke-width="0.5"/>
  <line x1="580" y1="86" x2="580" y2="310" stroke="#065F46" stroke-width="0.5"/>

  <!-- WIP limit indicator -->
  <text x="530" y="114" text-anchor="middle" font-size="9" fill="#D97706">WIP limit: 3</text>

  <!-- Queue items -->
  <rect x="412" y="122" width="56" height="24" rx="4" fill="#3d2508" stroke="#D97706" stroke-width="0.5"/>
  <text x="440" y="138" text-anchor="middle" font-size="9" fill="#FBBF24">Ticket</text>

  <rect x="412" y="152" width="56" height="24" rx="4" fill="#3d2508" stroke="#D97706" stroke-width="0.5"/>
  <text x="440" y="168" text-anchor="middle" font-size="9" fill="#FBBF24">Ticket</text>

  <rect x="412" y="182" width="56" height="24" rx="4" fill="#5c1a1a" stroke="#EF4444" stroke-width="0.5"/>
  <text x="440" y="198" text-anchor="middle" font-size="9" fill="#FCA5A5">P1</text>

  <!-- In Progress items -->
  <rect x="496" y="122" width="68" height="24" rx="4" fill="#0d3d24" stroke="#10B981" stroke-width="0.5"/>
  <text x="530" y="138" text-anchor="middle" font-size="9" fill="#6EE7B7">Ticket</text>

  <rect x="496" y="152" width="68" height="24" rx="4" fill="#0d3d24" stroke="#10B981" stroke-width="0.5"/>
  <text x="530" y="168" text-anchor="middle" font-size="9" fill="#6EE7B7">Data fix</text>

  <rect x="496" y="182" width="68" height="24" rx="4" fill="#0d3d24" stroke="#10B981" stroke-width="0.5"/>
  <text x="530" y="198" text-anchor="middle" font-size="9" fill="#6EE7B7">Escalation</text>

  <!-- Done items -->
  <rect x="594" y="122" width="68" height="24" rx="4" fill="#1e1e1e" stroke="#444" stroke-width="0.5"/>
  <text x="628" y="138" text-anchor="middle" font-size="9" fill="#888888">Resolved</text>

  <rect x="594" y="152" width="68" height="24" rx="4" fill="#1e1e1e" stroke="#444" stroke-width="0.5"/>
  <text x="628" y="168" text-anchor="middle" font-size="9" fill="#888888">Resolved</text>

  <rect x="594" y="182" width="68" height="24" rx="4" fill="#1e1e1e" stroke="#444" stroke-width="0.5"/>
  <text x="628" y="198" text-anchor="middle" font-size="9" fill="#888888">Resolved</text>

  <rect x="594" y="212" width="68" height="24" rx="4" fill="#1e1e1e" stroke="#444" stroke-width="0.5"/>
  <text x="628" y="228" text-anchor="middle" font-size="9" fill="#888888">Resolved</text>

  <!-- Result -->
  <line x1="412" y1="258" x2="668" y2="258" stroke="#065F46" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="540" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#6EE7B7">Result: Work flows continuously</text>
  <text x="540" y="296" text-anchor="middle" font-size="10" fill="#aaaaaa">Cycle time: tracked per item</text>
  <text x="540" y="312" text-anchor="middle" font-size="10" fill="#aaaaaa">No carryover, no broken commitments</text>
  <text x="540" y="328" text-anchor="middle" font-size="10" fill="#aaaaaa">Team trusts the process</text>

  <!-- Footer -->
  <line x1="40" y1="358" x2="680" y2="358" stroke="#555" stroke-width="0.5"/>
  <text x="360" y="380" text-anchor="middle" font-size="12" fill="#aaaaaa" font-style="italic">Same team. Same work. Different delivery model. Different outcome.</text>

</svg>
